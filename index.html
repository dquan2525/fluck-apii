<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FLUCK API</title>
    <script>
        fetch('config.json')
            .then(r => r.json())
            .then(data => {
                window.location.href = data.api_url;
            })
            .catch(() => {
                document.body.innerHTML = '<h2>Lỗi kết nối</h2>';
            });
    </script>
</head>
<body>
    <p>Đang chuyển hướng...</p>
</body>
</html>
